name: Sync Template to Multiple Repos

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - RenAhsAcme/SYSU-Network-Solution
          - RenAhsAcme/NCRE-III-Linux
          - RenAhsAcme/FP_Copilot_KeyboardTool
          - RenAhsAcme/ZenlessZoneZero_MusicVisualizer
          - RenAhsAcme/FP-Tools

    steps:
    - name: Checkout template repo
      uses: actions/checkout@v4

    - name: Clone downstream repo
      run: |
        git clone https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/${{ matrix.repo }}.git downstream

    - name: Setup Git
      run: |
        git config --global user.name "template-bot"
        git config --global user.email "template-bot@users.noreply.github.com"

    - name: Add upstream
      run: |
        cd downstream
        git remote add upstream https://github.com/RenAhsAcme/Personal_Template_Base.git || true
        git fetch upstream
  
    - name: Sync template files
      run: |
        rsync -av \
          --exclude '.git' \
          --exclude 'README.md' \
          --exclude '.github/workflows' \
          --exclude 'downstream' \
          ./ downstream/
  
    - name: Create branch
      run: |
        cd downstream
        git checkout -B template-sync origin/main
  
    - name: Create PR
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.SYNC_TOKEN }}
        path: downstream
        branch: template-sync
        base: main
        title: "chore: 同步上游模板更新 chore: Sync template updates"
        body: |
          该 PR 由机器人发起，旨在同步上游仓库模板的更改动作。请参阅 [RenAhsAcme/Personal_Template_Base](https://github.com/RenAhsAcme/Personal_Template_Base)。
          This PR was initiated by a bot and aims to synchronize changes to the template in the upstream repository. See [RenAhsAcme/Personal_Template_Base](https://github.com/RenAhsAcme/Personal_Template_Base).
